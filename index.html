<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ONEIROVORE | 食梦者</title>

  <style>
    body {
      margin: 0;
      background: #050508;
      color: #e6e6e6;
      font-family: "Arial", "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 30%, #1a1a2a, #050508 70%);
      opacity: 0.9;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      letter-spacing: 6px;
      margin: 0;
      font-weight: 300;
    }

    .sub {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.6;
      letter-spacing: 3px;
    }

    .menu {
      margin-top: 60px;
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .item {
      padding: 12px 22px;
      border: 1px solid rgba(255,255,255,0.15);
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
      letter-spacing: 2px;
    }

    .item:hover {
      border-color: rgba(255,255,255,0.6);
      transform: translateY(-2px);
    }

    .footer {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      opacity: 0.3;
      letter-spacing: 2px;
    }

    .fog {
      position: fixed;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 60%);
      animation: drift 12s infinite linear;
      z-index: 1;
    }

    @keyframes drift {
      0% { transform: translate(0,0); }
      50% { transform: translate(5%,3%); }
      100% { transform: translate(0,0); }
    }
    a {
      color: inherit;
      text-decoration: none;
      }

  </style>
</head>

<body>
  <div class="bg"></div>
  <div class="fog"></div>

  <div class="container">
    <h1>ONEIROVORE</h1>
    <div class="sub">食梦者 · 夜的系统</div>

    <div class="menu">
      <a class="btn" href="#">焚野</a>
      <a class="btn" href="wind.html">风徵</a>
      <a class="btn" href="#">鸾音</a>
    </div>
  </div>

  <div class="footer">
    “梦不是记忆，是吞噬”
  </div>
</body>
</html>
