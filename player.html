<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ONEIROVORE | Player</title>

<style>

/* =========================
   🌑 BASE
========================= */
body {
  margin: 0;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  color: #e8e8e8;

  background:
    radial-gradient(circle at 50% 20%, rgba(120,130,160,0.18), transparent 40%),
    radial-gradient(circle at 20% 80%, rgba(80,90,120,0.10), transparent 45%),
    radial-gradient(circle at 80% 60%, rgba(40,45,70,0.25), transparent 55%),
    linear-gradient(180deg, #0a0c12 0%, #05060a 70%, #030407 100%);
}

/* =========================
   🌑 NAV（关键修复）
========================= */
.nav {
  position: absolute;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;

  display: flex;
  gap: 28px;
  align-items: center;

  font-size: 12px;
  letter-spacing: 3px;
  color: rgba(232,232,232,0.46);
}

.nav a {
  color: inherit;
  text-decoration: none;
  transition: 0.28s ease;
}

.nav a:hover {
  color: rgba(255,255,255,0.86);
  text-shadow: 0 0 18px rgba(180,190,220,0.18);
}

/* =========================
   🌑 LAYOUT（居中核心）
========================= */
.wrap {
  max-width: 520px;
  margin: 0 auto;
  padding: 80px 20px 80px;

  display: flex;
  flex-direction: column;
  align-items: center;

  /* ⭐关键：锁定视觉稳定性 */
  position: relative;
}

/* =========================
   🌑 TITLE
========================= */
.title {
  font-size: 12px;
  letter-spacing: 6px;
  opacity: 0.5;
  margin-bottom: 26px;
}

/* =========================
   🌑 COVER
========================= */
.cover {
  width: 300px;
  height: 300px;
  margin: 0 auto 18px;
  display: block;
  object-fit: cover;

  box-shadow:
    0 0 60px rgba(0,0,0,0.6),
    0 0 120px rgba(120,140,180,0.12);
}

/* =========================
   🌑 TEXT
========================= */
.album {
  font-size: 22px;
  margin-bottom: 6px;
}

.desc {
  font-size: 12px;
  opacity: 0.45;
  margin-bottom: 18px;
}

.now {
  font-size: 18px;
  margin-top: 8px;
}

.sub {
  font-size: 12px;
  opacity: 0.4;
  margin-bottom: 18px;
}

/* =========================
   🌑 AUDIO（统一300px）
========================= */
audio {
  width: 300px;
  margin: 10px auto 24px;
  display: block;
}

/* =========================
   🌑 TRACK LIST（关键稳定）
========================= */
#list {
  width: 300px;
  margin: 0 auto;
  text-align: left;
}

/* =========================
   🌑 TRACK
========================= */
.track {
  display: flex;
  align-items: center;
  gap: 12px;

  padding: 13px 0;
  cursor: pointer;

  border-bottom: 1px solid rgba(255,255,255,0.05);

  transition: 0.25s;
}

/* hover */
.track:hover {
  transform: translateX(4px);
}

/* 数字 */
.num {
  width: 28px;
  font-size: 11px;
  opacity: 0.35;
}

/* 歌名 */
.name {
  font-size: 15px;
}

/* active */
.track.active {
  color: #fff;
}

.track.active .num {
  opacity: 0.9;
}

/* =========================
   🌑 PLAY STATE
========================= */
body.playing {
  animation: breath 6s ease-in-out infinite;
}

@keyframes breath {
  0% { filter: brightness(0.92); }
  50% { filter: brightness(1.05); }
  100% { filter: brightness(0.92); }
}

</style>
</head>

<body>

<!-- 🌑 NAV -->
<nav class="nav">
  <a href="index.html">HOME</a>
  <a href="#">焚野</a>
  <a href="wind.html">风徵</a>
  <a href="#">鸾音</a>
</nav>

<div class="wrap">

  <div class="title">ONEIROVORE · PLAYER</div>
  <div class="album" id="album"></div>
  <div class="desc" id="desc"></div>
  <img class="cover" src="images/album.jpg"/>

  

  <div class="now" id="now"></div>
  <div class="sub" id="sub"></div>

  <audio id="audio" controls></audio>

  <div id="list"></div>

</div>

<script>

/* =========================
   🌑 DATA
========================= */
const album = {
  artist: "风徵",
  album: "夜水集",
  sub: "ONEIROVORE · 风徵",
  desc: "夜是缓慢下沉的声音。",
  songs: [
    { name: "照影", file: "audio/zhaoying.mp3" },
    { name: "慢慢的", file: "audio/manmande.mp3" },
    { name: "三条鱼", file: "audio/santiaoyu.mp3" },
    { name: "鸾鸟自歌", file: "audio/luanniao-zige.mp3" },
    { name: "那只停下来看蚂蚁搬家的鹰", file: "audio/ying.mp3" },
    { name: "追声", file: "audio/zhuisheng.mp3" },
    { name: "渡我二毛", file: "audio/duwoermao.mp3" },
    { name: "山海·之间", file: "audio/shanhai-zhijian.mp3" }
  ]
};

/* =========================
   🌑 INIT
========================= */
document.getElementById("album").innerText =
  album.artist + "《" + album.album + "》";

document.getElementById("desc").innerText = album.desc;

/* =========================
   🌑 RENDER
========================= */
const list = document.getElementById("list");

album.songs.forEach((s, i) => {

  const div = document.createElement("div");
  div.className = "track";

  div.innerHTML = `
    <span class="num">${String(i+1).padStart(2,'0')}</span>
    <span class="name">${s.name}</span>
  `;

  div.onclick = () => play(i);

  list.appendChild(div);
});

/* =========================
   🌑 PLAY
========================= */
function play(i) {

  const audio = document.getElementById("audio");
  const song = album.songs[i];

  document.getElementById("now").innerText = song.name;
  document.getElementById("sub").innerText = album.sub;

  audio.src = song.file;
  audio.play();

  document.querySelectorAll(".track").forEach((t, idx) => {
    t.classList.toggle("active", idx === i);
  });

  document.body.classList.add("playing");
}

/* 读取 URL 参数 */
const params = new URLSearchParams(window.location.search);
const trackIndex = parseInt(params.get("track") || "0", 10);

/* 根据 URL 播放对应歌曲 */
if (!isNaN(trackIndex) && album.songs[trackIndex]) {
  play(trackIndex);
} else {
  play(0);
}

</script>

</body>
</html>
